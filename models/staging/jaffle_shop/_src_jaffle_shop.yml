version: 2

sources:
  - name: jaffle_shop
    database: raw
    schema: jaffle_shop
    description: A Clone of Postgres Application data. 
    config: 
      freshness:
        warn_after:
          count: 3
          period: day
        error_after:
          count: 10
          period: day
      loaded_at_field: _etl_loaded_at
    tables:
      - name: customers
        description: Raw customers data
        columns:
          - name: id
            description: A Primary Key for customers data.
            data_tests:
              - unique
              - not_null
              
        config:
          freshness: null
      - name: orders
        description: Raw orders data
        columns:
          - name: id
            description: A Primary Key for Orders data.
            data_tests:
              - unique
              - not_null
              
        